name: Build MSI (on demand)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'installer/**'
      - '.github/workflows/build-msi-on-demand.yml'

permissions:
  contents: read

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Restore
        run: dotnet restore LiveStreamSound.slnx

      - name: Build libraries
        run: |
          dotnet build src/LiveStreamSound.Shared/LiveStreamSound.Shared.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Host/LiveStreamSound.Host.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Client/LiveStreamSound.Client.csproj -c Release --no-restore

      - name: Publish App (self-contained, bundled .NET runtime)
        run: >
          dotnet publish src/LiveStreamSound.App/LiveStreamSound.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --no-restore

      - name: Build MSI installer
        run: dotnet build installer/App/LiveStreamSound.App.Installer.wixproj -c Release --no-restore

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-MSI
          if-no-files-found: error
          path: |
            installer/App/bin/Release/*.msi
            installer/App/bin/Release/*.wixpdb

      - name: Upload self-contained publish folder
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-App-Portable
          if-no-files-found: error
          path: |
            src/LiveStreamSound.App/bin/Release/net10.0-windows/win-x64/publish/**
