name: Build App (on demand)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-app:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LiveStreamSound.slnx

      - name: Build libraries
        run: |
          dotnet build src/LiveStreamSound.Shared/LiveStreamSound.Shared.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Host/LiveStreamSound.Host.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Client/LiveStreamSound.Client.csproj -c Release --no-restore

      - name: Build App (single exe)
        run: dotnet build src/LiveStreamSound.App/LiveStreamSound.App.csproj -c Release --no-restore

      - name: Publish self-contained
        run: dotnet publish src/LiveStreamSound.App/LiveStreamSound.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish/

      - name: Upload App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-App
          if-no-files-found: error
          path: |
            publish/**

      # MSI installer (single bundle) comes in a later milestone —
      # current release is published as a self-contained win-x64 build.
