name: Build MSI (on demand)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LiveStreamSound.slnx

      - name: Build apps
        run: |
          dotnet build src/LiveStreamSound.Shared/LiveStreamSound.Shared.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Host/LiveStreamSound.Host.csproj -c Release --no-restore
          dotnet build src/LiveStreamSound.Client/LiveStreamSound.Client.csproj -c Release --no-restore

      - name: Test
        run: dotnet test LiveStreamSound.slnx -c Release --no-build --verbosity normal

      - name: Build MSI installers
        run: |
          dotnet build installer/Host/LiveStreamSound.Host.Installer.wixproj -c Release --no-restore
          dotnet build installer/Client/LiveStreamSound.Client.Installer.wixproj -c Release --no-restore

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-MSI
          if-no-files-found: error
          path: |
            installer/Host/bin/Release/*.msi
            installer/Client/bin/Release/*.msi
