name: Build MSI (on demand)

on:
  # Manual trigger only — the user prefers to approve every CI run
  # rather than burning ~3 minutes of Actions time on every merge.
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional: override computed version (e.g. 0.3.0.0). Leave empty to use latest git tag.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags needed so `git describe` can find the latest release tag.
          fetch-depth: 0

      - name: Compute version from git tag
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.version_override }}" -ne "") {
            $version = "${{ inputs.version_override }}"
            Write-Host "Using override version: $version"
          }
          else {
            $tag = (git describe --tags --abbrev=0 2>$null) -as [string]
            if ([string]::IsNullOrEmpty($tag)) {
              $tag = "v0.2.0"
              Write-Host "No git tag found, defaulting to $tag"
            } else {
              Write-Host "Latest git tag: $tag"
            }
            # Strip leading 'v' and any pre-release suffix (e.g. '-beta.1')
            $version = ($tag -replace '^v', '' -split '-')[0]
          }
          # MSI expects exactly 4 numeric parts. Pad with zeros.
          $parts = $version -split '\.'
          while ($parts.Count -lt 4) { $parts = $parts + '0' }
          $version4 = ($parts[0..3] -join '.')
          "version=$version4" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Computed MSI version: $version4"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Restore
        run: dotnet restore LiveStreamSound.slnx

      - name: Build libraries
        run: |
          dotnet build src/LiveStreamSound.Shared/LiveStreamSound.Shared.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet build src/LiveStreamSound.Host/LiveStreamSound.Host.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet build src/LiveStreamSound.Client/LiveStreamSound.Client.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Run unit tests
        run: dotnet test tests/LiveStreamSound.Shared.Tests/LiveStreamSound.Shared.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Publish App (self-contained, bundled .NET runtime)
        run: >
          dotnet publish src/LiveStreamSound.App/LiveStreamSound.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.version.outputs.version }}
          --no-restore

      - name: Build MSI installer
        run: dotnet build installer/App/LiveStreamSound.App.Installer.wixproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-MSI-v${{ steps.version.outputs.version }}
          if-no-files-found: error
          path: |
            installer/App/bin/Release/*.msi
            installer/App/bin/Release/*.wixpdb

      - name: Upload self-contained publish folder
        uses: actions/upload-artifact@v4
        with:
          name: LiveStreamSound-App-Portable-v${{ steps.version.outputs.version }}
          if-no-files-found: error
          path: |
            src/LiveStreamSound.App/bin/Release/net10.0-windows/win-x64/publish/**
